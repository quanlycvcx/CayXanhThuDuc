<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu Tuyến đường khu vực Thủ Đức </title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 15px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 5px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }
        .status-loading { background: #ffeaa7; color: #d63031; }
        .status-success { background: #badc58; color: #6ab04c; }
        .status-error { background: #ff7675; color: #d63031; }

        .search-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--primary-color);
        }

        .form-group input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 5px rgba(39, 174, 96, 0.2);
        }

        .table-container {
            overflow-x: auto;
            margin-top: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 15px;
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            color: #444;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f2f6;
        }

        .no-result {
            text-align: center;
            padding: 30px;
            color: #d63031;
            font-weight: bold;
            font-size: 16px;
            background: #fff5f5;
            border: 1px dashed #ff8787;
            border-radius: 6px;
            margin-top: 15px;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            header h1 { font-size: 20px; }
            td, th { padding: 10px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TRA CỨU TUYẾN ĐƯỜNG KHU VỰC THỦ ĐỨC</h1>
        <p>Phục vụ công tác quản lý, duy tu và giám sát cây xanh </p>
        <div id="dataStatus" class="status-badge status-loading">Đang kết nối dữ liệu ...</div>
    </header>

    <div class="search-box">
        <div class="form-group">
            <label for="searchStreet">Tên Tuyến Đường (Viết ngắn gọn/có dấu hoặc không dấu)</label>
            <input type="text" id="searchStreet" placeholder="Ví dụ: ntmk hoặc Nguyễn Thị Minh Khai...">
        </div>
        <div class="form-group">
            <label for="searchWard">Tên Phường / Xã</label>
            <input type="text" id="searchWard" placeholder="Ví dụ: Thủ Dầu Một, Bình Dương...">
        </div>
        <div class="form-group">
            <label for="searchCompany">Đơn vị duy tu</label>
            <input type="text" id="searchCompany" placeholder="Ví dụ: Công viên, Đô thị, DV công ích...">
        </div>
    </div>

    <div id="resultArea">
        <div class="table-container" id="tableContainer" style="display: none;">
            <table id="resultTable">
                <thead id="tableHeader">
                    </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
        <div id="emptyMessage" class="no-result" style="display: none;">
            Tuyến đường không thuộc phạm vi Trung tâm quản lý.
        </div>
    </div>
</div>

<script>
    // Đường dẫn công khai CSV từ Google Sheets của bạn
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSDBsLFYFoxn-SE2MQDETNgQrri1V3PxqEhWKxBghGXJr1FNb4LkjXg1PcawYnli_yFVQeyv2-PMv7/pub?gid=195844642&single=true&output=tsv';
    
    let rawData = [];
    let headers = [];

    // Hàm chuyển đổi chuỗi tiếng Việt sang không dấu để tìm kiếm thông minh cực chính xác
    function removeVietnameseTones(str) {
        if (!str) return '';
        str = str.toLowerCase();
        str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
        str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
        str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
        str = str.replace(/ò|ó|ọ|ỏ|ã|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
        str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
        str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
        str = str.replace(/đ/g, "d");
        // Hỗ trợ viết tắt bằng cách lấy các ký tự đầu (ví dụ: ntmk -> nguyen thi minh khai)
        return str.trim();
    }

    // Hàm xử lý phân tách file CSV (bao gồm xử lý dấu ngoặc kép an toàn)
    function parseCSV(text) {
        let lines = text.split(/\r\n|\n/);
        let result = [];
        for (let i = 0; i < lines.length; i++) {
            if (!lines[i]) continue;
            let row = [];
            let inQuotes = false;
            let current = '';
            for (let j = 0; j < lines[i].length; j++) {
                let char = lines[i][j];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            row.push(current.trim());
            result.push(row);
        }
        return result;
    }

    // Tải dữ liệu từ Google Sheets
    window.addEventListener('DOMContentLoaded', () => {
        fetch(csvUrl)
            .then(response => {
                if (!response.ok) throw new Error('Không thể tải dữ liệu từ liên kết Google Sheets.');
                return response.text();
            })
            .then(text => {
                const parsedData = parseCSV(text);
                if (parsedData.length > 0) {
                    headers = parsedData[0]; // Lấy danh sách tiêu đề cột
                    
                    // Chuyển đổi mảng thành Object danh sách để dễ thao tác
                    rawData = parsedData.slice(1).map(row => {
                        let item = {};
                        headers.forEach((header, index) => {
                            item[header] = row[index] || '';
                        });
                        return item;
                    });

                    // Khởi tạo tiêu đề bảng động dựa trên dữ liệu gốc
                    const headerHtml = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
                    document.getElementById('tableHeader').innerHTML = headerHtml;

                    // Cập nhật trạng thái
                    const status = document.getElementById('dataStatus');
                    status.innerText = `Đã tải thành công ${rawData.length} tuyến đường`;
                    status.className = 'status-badge status-success';

                    // Đăng ký sự kiện tìm kiếm thời gian thực (Real-time Input)
                    document.getElementById('searchStreet').addEventListener('input', performSearch);
                    document.getElementById('searchWard').addEventListener('input', performSearch);
                    document.getElementById('searchCompany').addEventListener('input', performSearch);
                    
                    // Hiển thị toàn bộ dữ liệu lúc ban đầu
                    performSearch();
                }
            })
            .catch(error => {
                console.error(error);
                const status = document.getElementById('dataStatus');
                status.innerText = 'Lỗi: Không thể kết nối dữ liệu! Hãy kiểm tra quyền chia sẻ link Google Sheets.';
                status.className = 'status-badge status-error';
            });
    });

    // Hàm thực hiện tra cứu
    function performSearch() {
        const txtStreet = removeVietnameseTones(document.getElementById('searchStreet').value);
        const txtWard = removeVietnameseTones(document.getElementById('searchWard').value);
        const txtCompany = removeVietnameseTones(document.getElementById('searchCompany').value);

        // Tự động nhận diện các cột phù hợp để tra cứu (Dựa trên từ khóa phổ biến trong tiêu đề)
        const colStreet = headers.find(h => removeVietnameseTones(h).includes('duong') || removeVietnameseTones(h).includes('tuyen')) || headers[1] || '';
        const colWard = headers.find(h => removeVietnameseTones(h).includes('phuong') || removeVietnameseTones(h).includes('xa')) || headers[2] || '';
        const colCompany = headers.find(h => removeVietnameseTones(h).includes('duy tu') || removeVietnameseTones(h).includes('don vi') || removeVietnameseTones(h).includes('quan ly')) || headers[headers.length - 1] || '';

        // Tiến hành lọc dữ liệu dựa trên đầu vào viết tắt hoặc viết ngắn gọn
        const filtered = rawData.filter(item => {
            const valStreet = removeVietnameseTones(item[colStreet]);
            const valWard = removeVietnameseTones(item[colWard]);
            const valCompany = removeVietnameseTones(item[colCompany]);

            // Kiểm tra điều kiện tìm kiếm viết tắt (Ví dụ: "nts" khớp với "Nguyễn Thị Thập")
            const matchStreet = txtStreet === '' || valStreet.includes(txtStreet) || getInitials(valStreet).includes(txtStreet);
            const matchWard = txtWard === '' || valWard.includes(txtWard);
            const matchCompany = txtCompany === '' || valCompany.includes(txtCompany) || getInitials(valCompany).includes(txtCompany);

            return matchStreet && matchWard && matchCompany;
        });

        renderTable(filtered);
    }

    // Hàm bổ trợ lấy ký tự viết tắt đầu của chuỗi (Nguyễn Văn Cừ -> nvc)
    function getInitials(str) {
        return str.split(' ').map(word => word[0]).join('');
    }

    // Xuất dữ liệu ra bảng giao diện
    function renderTable(data) {
        const tableContainer = document.getElementById('tableContainer');
        const emptyMessage = document.getElementById('emptyMessage');
        const tableBody = document.getElementById('tableBody');

        if (data.length === 0) {
            tableContainer.style.display = 'none';
            emptyMessage.style.display = 'block';
        } else {
            emptyMessage.style.display = 'none';
            tableContainer.style.display = 'block';

            let bodyHtml = '';
            data.forEach(item => {
                bodyHtml += 'tr';
                bodyHtml += '<tr>' + headers.map(h => `<td>${item[h]}</td>`).join('') + '</tr>';
            });
            tableBody.innerHTML = bodyHtml;
        }
    }
</script>

</body>
</html>
